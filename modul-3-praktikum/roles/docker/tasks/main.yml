---
- name: Install dependensi apt
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Tambahkan GPG key Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Tambahkan repository Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Tambahkan user ke group docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Pastikan Docker running
  service:
    name: docker
    state: started
    enabled: yes

- name: Verifikasi Docker berfungsi
  command: docker run --rm hello-world
  changed_when: false
  register: docker_test

- name: Tampilkan hasil verifikasi
  debug:
    msg: "Docker berhasil terinstall di {{ inventory_hostname }}"
  when: docker_test.rc == 0


- name: allow port 22 firewall
  ufw:
    rule: allow
    port: 22

- name: jalankan firewall
  ufw:
    state: enabled
