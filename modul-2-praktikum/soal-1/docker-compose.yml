services:
  arkhe-core:
    image: redis:alpine
    container_name: arkhe-core
    volumes:
      - arkhe_data:/data
    networks:
      - arkhe-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  energy-node:
    build: ./energy-node
    container_name: energy-node
    env_file: .env
    depends_on:
      arkhe-core:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - arkhe-network

  monitoring-terminal:
    image: nginx:latest
    container_name: monitoring-terminal
    ports:
      - "7070:80"
    volumes:
      - ./monitoring-terminal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - energy-node
    networks:
      - arkhe-network

networks:
  arkhe-network:
    driver: bridge

volumes:
  arkhe_data: