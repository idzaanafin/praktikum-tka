networks:
  dai-gurren-network:
    driver: bridge

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - dai-gurren-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - dai-gurren-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=simon
      - GF_SECURITY_ADMIN_PASSWORD=gigadrillbreaker
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - dai-gurren-network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
